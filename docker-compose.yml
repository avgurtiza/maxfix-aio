version: '3.8'

services:
  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: maxfix_nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend:/var/www/html
    depends_on:
      - php
    networks:
      - maxfix

  # PHP-FPM 8.3
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: maxfix_php
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_ENCRYPTION=null
    networks:
      - maxfix

  # Mailpit - Email Testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: maxfix_mailpit
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - maxfix

networks:
  maxfix:
    driver: bridge
