services:
  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: maxfix_nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend:/var/www/html
    depends_on:
      - php
    networks:
      - maxfix

  # PHP-FPM 8.3 - Backend
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: maxfix_php
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_ENCRYPTION=null
    networks:
      - maxfix

  # Composer - Install dependencies
  composer:
    image: composer:latest
    container_name: maxfix_composer
    volumes:
      - ./backend:/app
    working_dir: /app
    command: install --no-interaction --optimize-autoloader
    networks:
      - maxfix

  # Admin Panel - PHP-FPM 8.3
  admin-php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: maxfix_admin_php
    volumes:
      - ./admin:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=admin-postgres
      - DB_PORT=5432
      - DB_DATABASE=maxfix_admin
      - DB_USERNAME=maxfix_user
      - DB_PASSWORD=maxfix_password
    networks:
      - maxfix
    depends_on:
      - admin-postgres

  # Admin Panel - Nginx
  admin-nginx:
    image: nginx:alpine
    container_name: maxfix_admin_nginx
    ports:
      - "8081:80"
    volumes:
      - ./admin:/var/www/html
      - ./admin/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - maxfix
    depends_on:
      - admin-php

  # Admin Panel - PostgreSQL
  admin-postgres:
    image: postgres:15-alpine
    container_name: maxfix_admin_postgres
    environment:
      POSTGRES_DB: maxfix_admin
      POSTGRES_USER: maxfix_user
      POSTGRES_PASSWORD: maxfix_password
    volumes:
      - admin-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - maxfix

  # Admin Panel - Composer
  admin-composer:
    image: composer:latest
    container_name: maxfix_admin_composer
    volumes:
      - ./admin:/app
    working_dir: /app
    command: install --no-interaction --optimize-autoloader
    networks:
      - maxfix
    depends_on:
      - admin-postgres

  # Mailpit - Email Testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: maxfix_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - maxfix

networks:
  maxfix:
    driver: bridge

volumes:
  admin-postgres-data:
