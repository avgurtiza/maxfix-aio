name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests (PHP ${{ matrix.php-versions }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.2', '8.3']

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, xml, bcmath, gd, pdo, pdo_sqlite, pdo_pgsql
          ini-values: date.timezone=UTC

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Create .env file
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan jwt:secret --force

      - name: Run migrations
        run: php artisan migrate --env=testing

      - name: Execute tests
        run: php artisan test --env=testing

      - name: Upload coverage report
        if: matrix.php-versions == '8.2'
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella

  admin-tests:
    name: Admin Panel Tests (PHP ${{ matrix.php-versions }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.2', '8.3']

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, xml, bcmath, gd, pdo, pdo_pgsql
          ini-values: date.timezone=UTC

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Create .env file
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan jwt:secret --force

      - name: Run migrations
        run: php artisan migrate --env=testing

      - name: Execute tests
        run: php artisan test --env=testing

      - name: Upload coverage report
        if: matrix.php-versions == '8.2'
        uses: codecov/codecov-action@v3
        with:
          files: ./admin/coverage.xml
          flags: unittests
          name: codecov-umbrella

  linting:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, gd
          ini-values: date.timezone=UTC

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run Pint (Laravel Code Style)
        run: ./vendor/bin/pint --test

      - name: Run PHPStan (Static Analysis)
        uses: docker://ghcr.io/phpstan/phpstan:latest
        with:
          args: analyse --configuration phpstan.neon

  frontend-build:
    name: Frontend Build (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-assets
          path: backend/public/build/
          retention-days: 1
